name: client
description: "CloudNote - 跨平台云存储 & 图片OCR工具"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  provider: ^6.1.1
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  open_file: ^3.3.2
  mime: ^1.0.5
  local_notifier: ^0.1.5
  tray_manager: ^0.2.0
  window_manager: ^0.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/tray_icon.ico
