services:
  server:
    build: ./server
    ports:
      - "11408:11408"
    volumes:
      - cloudnote-storage:/app/storage
      - cloudnote-db:/app/data
    environment:
      - CLOUDNOTE_AI_API_KEY=${CLOUDNOTE_AI_API_KEY:-}
    restart: unless-stopped

volumes:
  cloudnote-storage:
  cloudnote-db:
